spring:
  application:
    name: broker
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  mvc:
    problemdetails:
      enabled: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    group: true

server:
  servlet:
    context-path: /api

app:
  pricing:
    base-cpu-rate-per-hour: ${BASE_CPU_RATE_PER_HOUR}
    base-gpu-rate-per-hour: ${BASE_GPU_RATE_PER_HOUR}
    base-ram-rate-per-hour: ${BASE_RAM_RATE_PER_HOUR}
  security:
    cookie:
      secure: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

application:
  security:
    jwt:
      public-key: ${JWT_PUBLIC_KEY_PATH}
      private-key: ${JWT_PRIVATE_KEY_PATH}
      expiration: ${JWT_EXPIRATION_MS}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS}
