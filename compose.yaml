services:
  postgres:
    image: postgres:17-alpine
    container_name: pcrm_postgres
    restart: "no"
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pcrm_redis
    restart: "no"
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      retries: 5

  broker:
    build:
      context: apps/broker
      dockerfile: Dockerfile
    container_name: pcrm_broker
    restart: "no"
    ports:
      - "${BROKER_PORT}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE
      - DATABASE_URL
      - DATABASE_USERNAME
      - DATABASE_PASSWORD
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
      - JWT_EXPIRATION_MS
      - JWT_REFRESH_EXPIRATION_MS
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: pcrm_minio
    restart: "no"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nomad:
    image: hashicorp/nomad:1.7
    container_name: pcrm_nomad
    restart: "no"
    ports:
      - "${NOMAD_HTTP_PORT}:4646"
      - "${NOMAD_RPC_PORT}:4647"
      - "${NOMAD_SERF_PORT}:4648"
    # Using -dev for a single-node cluster (server + client).
    command: agent -dev -bind 0.0.0.0 -network-interface eth0
    privileged: true
    environment:
      CHECKPOINT_DISABLE: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys/fs/cgroup:/sys/fs/cgroup

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: pcrm_frontend
    restart: "no"
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      broker:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
