services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: "no"
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: "no"
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: "no"
    ports:
      - "${MINIO_API_PORT}:${MINIO_API_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    env_file:
      - .env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nomad:
    image: hashicorp/nomad:1.7
    container_name: nomad
    restart: "no"
    ports:
      - "${NOMAD_HTTP_PORT}:${NOMAD_HTTP_PORT}"
      - "${NOMAD_RPC_PORT}:${NOMAD_RPC_PORT}"
      - "${NOMAD_SERF_PORT}:${NOMAD_SERF_PORT}"
    # Added -config pointing to the mounted file
    command: agent -dev -bind 0.0.0.0 -network-interface eth0
    privileged: true
    cgroup: host
    environment:
      CHECKPOINT_DISABLE: "1"
      NOMAD_SKIP_DOCKER_IMAGE_WARN: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: backend
    restart: "no"
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - .env
    volumes:
      - ./secrets:/app/secrets:ro
      - ./nomad:/app/nomad:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    container_name: frontend
    restart: "no"
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
