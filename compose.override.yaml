services:
  postgres:
    ports:
      - "${POSTGRES_PORT}:5432" # Exposed for local debugging
    restart: "no"

  redis:
    ports:
      - "${REDIS_PORT}:6379"
    restart: "no"

  minio:
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    restart: "no"

  nomad:
    ports:
      - "${NOMAD_HTTP_PORT}:4646"
      - "${NOMAD_RPC_PORT}:4647"
      - "${NOMAD_SERF_PORT}:4648"
    restart: "no"

  broker:
    ports:
      - "${BROKER_PORT}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DATABASE_URL=${BROKER_DB_URL}
      - DATABASE_USERNAME=${BROKER_DB_USERNAME}
      - DATABASE_PASSWORD=${BROKER_DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  agent:
    build:
      context: apps/agent
    container_name: pcrm_agent
    environment:
      - BROKER_URL=http://broker:${BROKER_PORT}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      broker:
        condition: service_healthy
    restart: "no"
