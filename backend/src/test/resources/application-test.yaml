spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

  flyway:
    enabled: false

app:
  nomad:
    enabled: false
    sync:
      enabled: false
      interval-ms: 60000
      stale-timeout-sec: 300
  events:
    outbox:
      enabled: false
  security:
    cookie:
      secure: false
  cors:
    allowed-origins: http://localhost:3000

application:
  security:
    jwt:
      public-key: src/test/resources/jwt/test-public.pem
      private-key: src/test/resources/jwt/test-private.pem
      expiration: 900000
      refresh-expiration: 604800000
