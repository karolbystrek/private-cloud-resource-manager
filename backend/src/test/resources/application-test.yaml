spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=RUNSCRIPT FROM 'classpath:h2-auth.sql'
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        default_schema: PUBLIC

  flyway:
    enabled: false

app:
  nomad:
    enabled: false
    sync:
      enabled: false
      interval-ms: 60000
      stale-timeout-sec: 300
  events:
    outbox:
      enabled: false
  security:
    supabase:
      jwt-secret: test-test-test-test-test-test-test-test-test-test-test
    cookie:
      secure: false
  cors:
    allowed-origins: http://localhost:3000

  storage:
    s3:
      endpoint: http://localhost:9000
      access-key: test
      secret-key: test
      region: us-east-1
      bucket: test-bucket
      path-style-access: true
      presign:
        upload-ttl-sec: 900
        download-ttl-sec: 900
