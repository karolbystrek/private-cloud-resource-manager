spring:
  application:
    name: backend
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  mvc:
    problemdetails:
      enabled: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    group: true

server:
  servlet:
    context-path: /api

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  nomad:
    base-url: ${NOMAD_BASE_URL}
    job-template: ${NOMAD_WORKLOAD_TEMPLATE_PATH}
    sync:
      enabled: ${NOMAD_SYNC_ENABLED}
      interval-ms: ${NOMAD_SYNC_INTERVAL_MS}
      stale-timeout-sec: ${NOMAD_SYNC_STALE_TIMEOUT_SEC}
  pricing:
    base-cpu-rate-per-hour: ${BASE_CPU_RATE_PER_HOUR}
    base-ram-rate-per-hour: ${BASE_RAM_RATE_PER_HOUR}
  security:
    cookie:
      secure: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

application:
  security:
    jwt:
      public-key: ${JWT_PUBLIC_KEY_PATH}
      private-key: ${JWT_PRIVATE_KEY_PATH}
      expiration: ${JWT_EXPIRATION_MS}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS}
