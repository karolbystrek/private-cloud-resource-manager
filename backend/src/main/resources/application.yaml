spring:
  application:
    name: backend
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  mvc:
    problemdetails:
      enabled: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    group: true

server:
  servlet:
    context-path: /api

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  nomad:
    enabled: ${NOMAD_ENABLED:true}
    base-url: ${NOMAD_BASE_URL}
    job-template: ${NOMAD_WORKLOAD_TEMPLATE_PATH}
    docker-compose-network: ${NOMAD_DOCKER_NETWORK:private-cloud-resource-manager_default}
    sync:
      enabled: ${NOMAD_SYNC_ENABLED}
      interval-ms: ${NOMAD_SYNC_INTERVAL_MS}
      stale-timeout-sec: ${NOMAD_SYNC_STALE_TIMEOUT_SEC}
  quota:
    lease-minutes: ${QUOTA_LEASE_MINUTES:15}
  logs:
    capture:
      enabled: ${LOG_CAPTURE_ENABLED:true}
      interval-ms: ${LOG_CAPTURE_INTERVAL_MS:5000}
      batch-size: ${LOG_CAPTURE_BATCH_SIZE:50}
  jobs:
    details-stream:
      interval-ms: ${JOB_DETAILS_STREAM_INTERVAL_MS:2000}
      timeout-ms: ${JOB_DETAILS_STREAM_TIMEOUT_MS:1800000}
  idempotency:
    cleanup:
      enabled: ${IDEMPOTENCY_CLEANUP_ENABLED:true}
      cron: ${IDEMPOTENCY_CLEANUP_CRON:0 0 * * * *}
      retention-hours: ${IDEMPOTENCY_RETENTION_HOURS:24}
  scheduler:
    dispatch:
      interval-ms: ${SCHEDULER_DISPATCH_INTERVAL_MS:3000}
      retry-stale-after-ms: ${SCHEDULER_DISPATCH_RETRY_STALE_AFTER_MS:60000}
    lease:
      interval-ms: ${LEASE_ENFORCER_INTERVAL_MS:30000}
      safety-window-ms: ${LEASE_ENFORCER_SAFETY_WINDOW_MS:120000}
      batch-size: ${LEASE_ENFORCER_BATCH_SIZE:50}
  events:
    outbox:
      enabled: ${EVENTS_OUTBOX_ENABLED:true}
      poll-interval-ms: ${EVENTS_OUTBOX_POLL_INTERVAL_MS:1000}
      batch-size: ${EVENTS_OUTBOX_BATCH_SIZE:25}
      claim-timeout-ms: ${EVENTS_OUTBOX_CLAIM_TIMEOUT_MS:60000}
      retry-delay-ms: ${EVENTS_OUTBOX_RETRY_DELAY_MS:5000}
      worker-name: ${EVENTS_OUTBOX_WORKER_NAME:}
  security:
    supabase:
      jwt-secret: ${JWT_SECRET}
    cookie:
      secure: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

  storage:
    s3:
      endpoint: ${STORAGE_S3_ENDPOINT}
      access-key: ${MINIO_ROOT_USER}
      secret-key: ${MINIO_ROOT_PASSWORD}
      region: ${REGION}
      bucket: ${GLOBAL_S3_BUCKET}
      path-style-access: ${STORAGE_S3_PATH_STYLE_ACCESS:true}
      presign:
        upload-ttl-sec: ${STORAGE_S3_PRESIGN_UPLOAD_TTL_SEC:604800}
        download-ttl-sec: ${STORAGE_S3_PRESIGN_DOWNLOAD_TTL_SEC:900}
    artifacts:
      finalizer-interval-ms: ${ARTIFACT_FINALIZER_INTERVAL_MS:10000}
      finalizer-batch-size: ${ARTIFACT_FINALIZER_BATCH_SIZE:50}
      missing-timeout-ms: ${ARTIFACT_MISSING_TIMEOUT_MS:120000}
