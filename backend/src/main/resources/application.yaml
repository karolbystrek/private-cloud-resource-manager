spring:
  application:
    name: backend
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  mvc:
    problemdetails:
      enabled: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    group: true

server:
  servlet:
    context-path: /api

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  nomad:
    enabled: ${NOMAD_ENABLED:true}
    base-url: ${NOMAD_BASE_URL}
    job-template: ${NOMAD_WORKLOAD_TEMPLATE_PATH}
    sync:
      enabled: ${NOMAD_SYNC_ENABLED}
      interval-ms: ${NOMAD_SYNC_INTERVAL_MS}
      stale-timeout-sec: ${NOMAD_SYNC_STALE_TIMEOUT_SEC}
  quota:
    lease-minutes: ${QUOTA_LEASE_MINUTES:15}
  scheduler:
    dispatch:
      interval-ms: ${SCHEDULER_DISPATCH_INTERVAL_MS:3000}
      base-quantum: ${SCHEDULER_BASE_QUANTUM:25}
      age-boost-per-minute: ${SCHEDULER_AGE_BOOST_PER_MINUTE:2}
  events:
    outbox:
      enabled: ${EVENTS_OUTBOX_ENABLED:true}
      poll-interval-ms: ${EVENTS_OUTBOX_POLL_INTERVAL_MS:1000}
      batch-size: ${EVENTS_OUTBOX_BATCH_SIZE:25}
      claim-timeout-ms: ${EVENTS_OUTBOX_CLAIM_TIMEOUT_MS:60000}
      retry-delay-ms: ${EVENTS_OUTBOX_RETRY_DELAY_MS:5000}
      worker-name: ${EVENTS_OUTBOX_WORKER_NAME:}
  security:
    cookie:
      secure: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

  storage:
    s3:
      endpoint: ${STORAGE_S3_ENDPOINT}
      access-key: ${STORAGE_S3_ACCESS_KEY}
      secret-key: ${STORAGE_S3_SECRET_KEY}
      region: ${STORAGE_S3_REGION:us-east-1}
      bucket: ${STORAGE_S3_BUCKET:job-artifacts}
      path-style-access: ${STORAGE_S3_PATH_STYLE_ACCESS:true}
      presign:
        upload-ttl-sec: ${STORAGE_S3_PRESIGN_UPLOAD_TTL_SEC:900}
        download-ttl-sec: ${STORAGE_S3_PRESIGN_DOWNLOAD_TTL_SEC:900}

application:
  security:
    jwt:
      public-key: ${JWT_PUBLIC_KEY_PATH}
      private-key: ${JWT_PRIVATE_KEY_PATH}
      expiration: ${JWT_EXPIRATION_MS}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS}
