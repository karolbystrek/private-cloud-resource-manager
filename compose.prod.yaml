services:
  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    restart: always
    environment:
      MINIO_BROWSER: "off"
    deploy:
        resources:
            limits:
                memory: 1G

  nomad:
    restart: always
    deploy:
        resources:
            limits:
                memory: 1G

  broker:
    restart: always
    ports:
      - "80:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=${PROD_DB_URL}
      - DATABASE_USERNAME=${PROD_DB_USER}
      - DATABASE_PASSWORD=${PROD_DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
